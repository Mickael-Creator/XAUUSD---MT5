# ============================================================
# nginx_goldml.conf
# Gold ML API — Nginx Reverse Proxy Configuration
# AUDIT-VPS-C2: HTTPS termination, rate limiting, security headers
# ============================================================

# Rate limiting zone — 10 req/s per IP (burst 20)
limit_req_zone $binary_remote_addr zone=goldml_api:10m rate=10r/s;

# ============================================================
# HTTP → HTTPS redirect (port 80 → 443)
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE;  # Replace with actual domain / IP

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ============================================================
# HTTPS reverse proxy (port 443)
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN_HERE;  # Replace with actual domain / IP

    # --------------------------------------------------------
    # TLS — Let's Encrypt certificate (certbot placeholder)
    # Run: certbot --nginx -d YOUR_DOMAIN_HERE
    # --------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN_HERE/chain.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --------------------------------------------------------
    # Security headers
    # --------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'" always;

    # --------------------------------------------------------
    # Separate access log for trading API
    # --------------------------------------------------------
    access_log /var/log/nginx/goldml_api_access.log combined;
    error_log  /var/log/nginx/goldml_api_error.log warn;

    # --------------------------------------------------------
    # Health endpoint — no rate limiting (monitor-friendly)
    # --------------------------------------------------------
    location ~ ^/(v1/)?health$ {
        limit_req zone=goldml_api burst=5 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # --------------------------------------------------------
    # Trading signal endpoints — strict rate limiting
    # --------------------------------------------------------
    location /v1/news_trading_signal/ {
        limit_req zone=goldml_api burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
    }

    # --------------------------------------------------------
    # Legacy signal endpoint — rate limited (will 301 internally)
    # --------------------------------------------------------
    location /news_trading_signal/ {
        limit_req zone=goldml_api burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
    }

    # --------------------------------------------------------
    # All other API routes — rate limited
    # --------------------------------------------------------
    location /api/ {
        limit_req zone=goldml_api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    location /v1/api/ {
        limit_req zone=goldml_api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # --------------------------------------------------------
    # Deny everything else
    # --------------------------------------------------------
    location / {
        return 404;
    }
}
